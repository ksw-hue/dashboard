<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#e8eaf0;height:100vh;display:flex;flex-direction:column}
header{background:#181c27;border-bottom:1px solid #2a2f42;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#4f7fff;box-shadow:0 0 8px #4f7fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.toolbar{display:flex;gap:8px;align-items:center;flex-shrink:0;padding:8px 1.5rem;background:#181c27;border-bottom:1px solid #2a2f42;flex-wrap:wrap}
select{background:#1e2333;border:1px solid #2a2f42;color:#e8eaf0;border-radius:8px;padding:6px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer}
select:focus{border-color:#4f7fff}
.legend{display:flex;align-items:center;gap:12px;margin-left:auto;font-size:12px;color:#9ba3bc}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:11px;height:11px;border-radius:50%}
.content{display:flex;flex:1;overflow:hidden}
#map{flex:1}
.sidebar{width:320px;background:#181c27;border-left:1px solid #2a2f42;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:.8rem 1rem;border-bottom:1px solid #2a2f42;font-size:11px;font-weight:600;color:#9ba3bc;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between}
.sidebar-search{padding:8px 1rem;border-bottom:1px solid #2a2f42}
.sidebar-search input{width:100%;background:#1e2333;border:1px solid #2a2f42;color:#e8eaf0;border-radius:8px;padding:6px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none}
.sidebar-search input:focus{border-color:#4f7fff}
.sidebar-content{overflow-y:auto;flex:1}
.region-item{padding:10px 1rem;border-bottom:1px solid #1c2030;cursor:pointer;transition:background .15s}
.region-item:hover{background:#1e2333}
.region-item.active{background:#1a2a4a;border-left:3px solid #4f7fff}
.region-name{font-size:13px;font-weight:500;color:#e8eaf0;margin-bottom:4px}
.region-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.b1{background:#1a3a2a;color:#34c78a;border:1px solid #2a5a3a}
.b2{background:#1a2a4a;color:#7fb3ff;border:1px solid #2a3a6a}
.b3{background:#3a2a0a;color:#f5a623;border:1px solid #5a4a1a}
.b4{background:#2a1a1a;color:#e05252;border:1px solid #4a2a2a}
.bx{background:#1e2333;color:#5c6480;border:1px solid #2a2f42}
.bt{background:#2a1f4a;color:#9b7fff;border:1px solid #3a2f6a;font-size:10px}
.surgery-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none}
.popup-overlay.show{display:block}
.popup-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#181c27;border:1px solid #2a2f42;border-radius:14px;padding:1.5rem;width:360px;max-height:75vh;overflow-y:auto;z-index:1000;display:none;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.popup-wrap.show{display:block}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.popup-title{font-size:15px;font-weight:700}
.popup-close{background:none;border:none;color:#9ba3bc;cursor:pointer;font-size:22px;line-height:1;padding:0}
.popup-close:hover{color:#e8eaf0}
.popup-kw{padding:8px 0;border-bottom:1px solid #1c2030;display:flex;align-items:center;justify-content:space-between;gap:8px}
.popup-kw:last-child{border-bottom:none}
.popup-kw-left{flex:1;font-size:12px;color:#e8eaf0}
.popup-kw-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
#loadingOverlay{position:fixed;inset:0;background:#0f1117;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
.spinner{width:40px;height:40px;border:3px solid #2a2f42;border-top-color:#4f7fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#9ba3bc;font-size:14px}
.stats-bar{display:flex;gap:16px;align-items:center;font-size:12px;color:#9ba3bc;font-family:'DM Mono',monospace}
.stat-val{color:#e8eaf0;font-weight:600;margin-left:4px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#181c27}
::-webkit-scrollbar-thumb{background:#2a2f42;border-radius:3px}
</style>

<div class="toolbar">
  <select id="filterSurgery" onchange="applyFilter()"><option value="">전체 수술</option></select>
  <select id="filterRank" onchange="applyFilter()">

    <option value="1">1위</option>

    <div class="sidebar-content" id="sidebarList"></div>
  </div>
</div>

  '태릉입구':[37.6243,127.0756],'태릉입구역':[37.6243,127.0756],'퇴계원':[37.6723,127.1645],

  '평내호평역':[37.6512,127.2167],'포천':[37.8945,127.2003],'하계동':[37.6434,127.0734],

  '호평동':[37.6545,127.2234],'화도읍':[37.6987,127.3123],'화랑대역':[37.6267,127.0823],
  '회기역':[37.5898,127.0523],'회룡역':[37.7345,127.0412]
};

let RAW=[], filtered=[], map, markers=[], allRegionData=[];

function rankColor(r){if(r===null)return'#9ba3bc';if(r===1)return'#34c78a';if(r<=3)return'#4f7fff';if(r<=10)return'#f5a623';return'#e05252'}
function rankBadgeClass(r){if(r===null)return'bx';if(r===1)return'b1';if(r<=3)return'b2';if(r<=10)return'b3';return'b4'}
function rankLabel(r){return r===null?'미확인':r+'위'}

function parseCSVLine(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){if(line[i]==='"'){q=!q}else if(line[i]===','&&!q){r.push(c);c=''}else{c+=line[i]}}r.push(c);return r}

function parseCSV(text){
  const lines=text.trim().split('\n'),result=[];
  for(const line of lines){
    const cols=parseCSVLine(line);
    if(!cols[0]||isNaN(parseInt(cols[0])))continue;
    const keyword=(cols[2]||'').trim();
    if(!keyword)continue;
    const dateRaw=(cols[1]||'').trim();
    let date='',month='';
    const m1=dateRaw.match(/(\d{1,2})월\s*(\d{1,2})일/);
    const m2=dateRaw.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(m1){let y=new Date().getFullYear();const mo=parseInt(m1[1]);if(mo===12&&new Date().getMonth()<6)y--;date=`${y}-${String(mo).padStart(2,'0')}-${String(parseInt(m1[2])).padStart(2,'0')}`;month=`${y}-${String(mo).padStart(2,'0')}`;}
    else if(m2){date=dateRaw.substring(0,10);month=dateRaw.substring(0,7);}
    let surgery='기타';
    for(const s of SURGERY_LIST){if(keyword.includes(s)){surgery=s;break;}}
    let region=keyword;
    for(const s of SURGERY_LIST)region=region.replace(s,'').trim();
    const rankRaw=(cols[4]||'').trim();
    let rank=null;
    if(rankRaw&&rankRaw!=='-'&&rankRaw!==''){const r=parseInt(rankRaw);if(!isNaN(r))rank=r;}
    const bigo=(cols[5]||'').trim();
    result.push({seq:parseInt(cols[0]),date,month,keyword,region,surgery,url:(cols[3]||'').trim(),rank,is_blotab:bigo.includes('블탭')});
  }
  return result;
}

function groupByRegion(data){
  const m={};
  data.forEach(d=>{if(!m[d.region])m[d.region]=[];m[d.region].push(d);});
  return m;
}

function regionBestRank(rows){
  const ranked=rows.filter(r=>r.rank!==null);
  if(!ranked.length)return null;
  return Math.min(...ranked.map(r=>r.rank));
}

function makeSVGMarker(color, count){
  const size = count>9?38:count>4?32:26;
  const svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" fill-opacity="0.92" stroke="white" stroke-width="2.5"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="white" font-size="${size>32?13:10}" font-weight="bold" font-family="Arial">${count}</text></svg>`;
  return {
    src:`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`,
    size:new kakao.maps.Size(size,size),
    anchor:new kakao.maps.Point(size/2,size/2)
  };
}

function renderMap(){
  markers.forEach(m=>m.setMap(null));
  markers=[];

  const regionMap=groupByRegion(filtered);
  const regions=Object.keys(regionMap);

  document.getElementById('statTotal').textContent=filtered.length;
  document.getElementById('stat1').textContent=filtered.filter(d=>d.rank===1).length;
  document.getElementById('statRegion').textContent=regions.length;
  document.getElementById('regionCount').textContent=`${regions.length}곳`;

  allRegionData=Object.entries(regionMap).map(([r,rows])=>({region:r,rows,best:regionBestRank(rows)}))
    .sort((a,b)=>{if(a.best===null&&b.best===null)return 0;if(a.best===null)return 1;if(b.best===null)return -1;return a.best-b.best;});

  renderSidebar(allRegionData);

  // 마커 즉시 표시
  regions.forEach(region=>{
    const rows=regionMap[region];
    const best=regionBestRank(rows);
    const color=rankColor(best);
    const coords=COORDS[region];
    if(!coords)return;

    const img=makeSVGMarker(color,rows.length);
    const markerImg=new kakao.maps.MarkerImage(img.src,img.size,{offset:img.anchor});
    const marker=new kakao.maps.Marker({
      position:new kakao.maps.LatLng(coords[0],coords[1]),
      image:markerImg,map,title:region
    });
    kakao.maps.event.addListener(marker,'click',()=>showPopup(region,rows));
    markers.push(marker);
  });
}

function renderSidebar(data){
  document.getElementById('sidebarList').innerHTML=data.map(({region,rows,best})=>{
    const surgeries=[...new Set(rows.map(d=>d.surgery))];
    const bt=rows.filter(d=>d.is_blotab).length;
    return`<div class="region-item" id="ri-${region}" onclick="focusRegion('${region}')">
      <div class="region-name">${region} <span style="font-size:11px;color:#5c6480;font-weight:400">${rows.length}건</span></div>
      <div class="region-meta">
        <span class="badge ${rankBadgeClass(best)}">${rankLabel(best)}</span>
        ${surgeries.slice(0,2).map(s=>`<span class="surgery-tag" style="background:${SURGERY_COLORS[s]||'#888'}22;color:${SURGERY_COLORS[s]||'#888'}">${s}</span>`).join('')}
        ${bt?`<span class="badge bt">블탭 ${bt}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function filterSidebar(){
  const q=document.getElementById('sidebarSearch').value.toLowerCase();
  const filtered2=q?allRegionData.filter(d=>d.region.toLowerCase().includes(q)):allRegionData;
  renderSidebar(filtered2);
}

function showPopup(region,rows){
  document.getElementById('popupTitle').textContent=region+' ('+rows.length+'건)';
  document.getElementById('popupBody').innerHTML=rows.map(d=>`
    <div class="popup-kw">
      <div class="popup-kw-left">
        <span class="surgery-tag" style="background:${SURGERY_COLORS[d.surgery]||'#888'}22;color:${SURGERY_COLORS[d.surgery]||'#888'};margin-right:4px">${d.surgery}</span>
        ${d.is_blotab?'<span class="badge bt" style="margin-right:4px">블탭</span>':''}
        <span style="color:#9ba3bc;font-size:11px">${d.date}</span>
      </div>
      <div class="popup-kw-right">
        <span class="badge ${rankBadgeClass(d.rank)}">${rankLabel(d.rank)}</span>
        ${d.url?`<a href="${d.url}" target="_blank" style="color:#4f7fff;font-size:11px;text-decoration:none">링크</a>`:''}
      </div>
    </div>`).join('');
  document.getElementById('popup').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  document.querySelectorAll('.region-item').forEach(el=>el.classList.remove('active'));
  const ri=document.getElementById(`ri-${region}`);
  if(ri){ri.classList.add('active');ri.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

function closePopup(){
  document.getElementById('popup').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

function focusRegion(region){
  const coords=COORDS[region];
  if(coords){map.panTo(new kakao.maps.LatLng(coords[0],coords[1]));map.setLevel(5);}
  const rows=groupByRegion(filtered)[region]||[];
  if(rows.length)showPopup(region,rows);
}

function applyFilter(){
  const s=document.getElementById('filterSurgery').value;
  const r=document.getElementById('filterRank').value;
  const b=document.getElementById('filterBlotab').value;
  filtered=RAW.filter(d=>{
    if(s&&d.surgery!==s)return false;
    if(b==='블탭'&&!d.is_blotab)return false;
    if(b==='통합'&&d.is_blotab)return false;
    if(r==='1'&&d.rank!==1)return false;
    if(r==='1-3'&&(d.rank===null||d.rank>3))return false;
    if(r==='1-10'&&(d.rank===null||d.rank>10))return false;
    if(r==='11+'&&(d.rank===null||d.rank<=10))return false;
    return true;
  });
  renderMap();
}

async function init(){
  map=new kakao.maps.Map(document.getElementById('map'),{
    center:new kakao.maps.LatLng(37.6400,127.0800),level:9
  });
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`);
    const text=await res.text();
    RAW=parseCSV(text);
    filtered=[...RAW];
    const surgeries=[...new Set(RAW.map(d=>d.surgery))].sort();
    const sel=document.getElementById('filterSurgery');
    surgeries.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
    document.getElementById('loadingOverlay').style.display='none';
    renderMap();
  }catch(e){
    document.querySelector('.loading-text').textContent='데이터 불러오기 실패 — 새로고침 해주세요';
  }
}
window.onload=init;
</script>
</body>
</html>
